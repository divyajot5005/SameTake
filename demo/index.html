<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SameTake Demo</title>
    <link rel="stylesheet" href="demo-styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <h1>SameTake Demo</h1>
        <div class="controls">
          <label>
            Allowed repeats
            <select id="allowedRepeats">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="5">5</option>
            </select>
          </label>
          <button id="reset" type="button">Reset memory</button>
        </div>
      </div>
    </header>
    <main>
      <p class="intro">Scroll the feed. The fourth post in each repeated topic collapses automatically.</p>
      <section id="feed" aria-label="Demo feed"></section>
    </main>
    <script src="posts.js"></script>
    <script src="demo-content.js"></script>
  </body>
</html>
